<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Deploy Secretary - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deploy: {
                            back: '#0B0F14',
                            card: '#161B22',
                            text: '#E6EDF3',
                            bord: '#1F2937',
                            botton: '#22C55E',
                            bhover: '#16A34A',
                        },
                    }
                }
            }
        }
    </script>
</head>
<body id="mainBody" class="bg-deploy-back flex items-center justify-center min-h-screen p-4 transition-colors duration-500 ease-in-out">

    <div id="cardAcesso" class="bg-deploy-card p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-deploy-bord transition-all duration-500">
        
        <div class="text-center mb-6">
            <h1 id="statusTexto" class="text-2xl font-bold text-deploy-text uppercase tracking-widest font-mono">
                <i class="fas fa-terminal text-deploy-botton mr-2 text-sm"></i>Identifique-se
            </h1>
            <p id="subTexto" class="text-gray-500 text-sm mt-2 font-mono">Aguardando input de credenciais...</p>
        </div>

        <div class="relative mb-8">
            <input type="text" id="displayCPF" placeholder="000.000.000-00" readonly
                class="w-full text-center text-3xl font-mono py-4 bg-deploy-back border-2 border-deploy-bord rounded-2xl text-deploy-botton outline-none shadow-inner">
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('1')">1</button>
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('2')">2</button>
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('3')">3</button>
            
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('4')">4</button>
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('5')">5</button>
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('6')">6</button>
            
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('7')">7</button>
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('8')">8</button>
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('9')">9</button>
            
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-rose-500 text-2xl rounded-xl transition-all hover:bg-rose-500/10 active:scale-90" onclick="apagar()">
                <i class="fas fa-backspace"></i>
            </button>
            <button class="h-[70px] bg-deploy-back border border-deploy-bord text-deploy-text text-2xl font-semibold rounded-xl transition-all duration-200 hover:border-deploy-botton hover:text-deploy-botton active:scale-90 active:bg-deploy-botton active:text-deploy-back font-mono" onclick="addNum('0')">0</button>
            <button class="h-[70px] bg-deploy-botton text-deploy-back text-2xl rounded-xl transition-all hover:bg-deploy-bhover active:scale-90 shadow-lg shadow-deploy-botton/20" onclick="verificarAcesso()">
                <i class="fas fa-check-circle"></i>
            </button>
        </div>

        <div class="text-center mt-6">
            <p id="dataHora" class="text-gray-400 text-sm font-mono"></p>
        </div>
    </div>

    <script src="catraca.js"></script>
</body>
</html>
